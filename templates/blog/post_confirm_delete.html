{% extends 'base.html' %}
{% block title %}Delete Post - BlogPlatform{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card border-danger shadow-sm">
            <div class="card-body text-center p-5">
                <i class="fas fa-exclamation-triangle fa-3x text-danger mb-3"></i>
                <h4 class="fw-bold">Delete Post?</h4>
                <p class="text-muted">Are you sure you want to delete <strong>"{{ post.title }}"</strong>? This action cannot be undone.</p>
                <form method="post" class="d-flex gap-2 justify-content-center mt-4">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4">Yes, Delete</button>
                    <a href="{{ post.get_absolute_url }}" class="btn btn-outline-secondary px-4">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
