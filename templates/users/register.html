{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Register - BlogPlatform{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-user-plus fa-3x text-primary mb-3"></i>
                    <h3 class="fw-bold">Create Account</h3>
                    <p class="text-muted">Join BlogPlatform today</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary w-100 mt-3 py-2 fw-bold">
                        Sign Up
                    </button>
                </form>
                <hr>
                <p class="text-center mb-0 text-muted">
                    Already have an account? <a href="{% url 'users:login' %}">Login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
